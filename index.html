<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn Đùi Gà – Viettel Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- ══ HOME: CHỌN GÀ ══ -->
    <div id="home-screen" class="screen active">
        <div class="glass-panel">
            <h1 class="game-title">CHỌN MIẾNG GÀ</h1>
            <p class="subtitle">Nhấn vào một miếng gà để mở câu hỏi!</p>
            <div class="chicken-grid">
                <button class="chicken-btn" data-index="0">
                    <div class="chicken-img-wrap">
                        <img class="chicken-base" src="media/image13.png" alt="Gà 1">
                        <div class="chicken-dark"></div>
                    </div>
                    <span>Gà 1</span>
                </button>
                <button class="chicken-btn" data-index="1">
                    <div class="chicken-img-wrap">
                        <img class="chicken-base" src="media/image14.png" alt="Gà 2">
                        <div class="chicken-dark"></div>
                    </div>
                    <span>Gà 2</span>
                </button>
                <button class="chicken-btn" data-index="2">
                    <div class="chicken-img-wrap">
                        <img class="chicken-base" src="media/image15.png" alt="Gà 3">
                        <div class="chicken-dark"></div>
                    </div>
                    <span>Gà 3</span>
                </button>
                <button class="chicken-btn" data-index="3">
                    <div class="chicken-img-wrap">
                        <img class="chicken-base" src="media/image16.png" alt="Gà 4">
                        <div class="chicken-dark"></div>
                    </div>
                    <span>Gà 4</span>
                </button>
                <button class="chicken-btn" data-index="4">
                    <div class="chicken-img-wrap">
                        <img class="chicken-base" src="media/image17.png" alt="Gà 5">
                        <div class="chicken-dark"></div>
                    </div>
                    <span>Gà 5</span>
                </button>
                <button class="chicken-btn" data-index="5">
                    <div class="chicken-img-wrap">
                        <img class="chicken-base" src="media/image19.png" alt="Gà 6">
                        <div class="chicken-dark"></div>
                    </div>
                    <span>Gà 6</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ══ QUESTION SCREEN ══ -->
    <div id="question-screen" class="screen">
        <!-- Orbiting background character from Slide 1 / Slide 2 mascot -->
        <img class="orbit-chicken" src="media/image18.png" alt="">

        <div class="question-container">
            <button id="back-btn" class="glass-btn">← Trở về</button>

            <!-- Mascot inside question screen, on the right side -->
            <img class="mascot-inline" src="media/image27.png" alt="Mascot">

            <div class="q-header">
                <span class="q-badge" id="q-title">Câu 1</span>
            </div>

            <div class="question-box">
                <p id="q-text">Đang tải câu hỏi...</p>
            </div>

            <div class="answers-grid">
                <button class="answer-btn">
                    <span class="letter">A</span>
                    <span class="text">...</span>
                </button>
                <button class="answer-btn">
                    <span class="letter">B</span>
                    <span class="text">...</span>
                </button>
                <button class="answer-btn">
                    <span class="letter">C</span>
                    <span class="text">...</span>
                </button>
                <button class="answer-btn">
                    <span class="letter">D</span>
                    <span class="text">...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ══ FEEDBACK MODAL ══ -->
    <div id="feedback-modal" class="modal">
        <div class="modal-content glass-panel">
            <div class="modal-icon" id="modal-icon"></div>
            <h1 id="feedback-title"></h1>
            <p id="feedback-sub"></p>
            <button id="next-btn" class="action-btn">Tiếp Tục</button>
        </div>
    </div>

    <audio id="audio-correct" src="media/audio1.wav"></audio>
    <audio id="audio-wrong"   src="media/audio2.wav"></audio>

    <script src="bg.js"></script>
    <script src="app.js"></script>
</body>
</html>
