<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minigame Viettel - Chọn miếng gà</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="confettiCanvas" aria-hidden="true"></canvas>

    <main class="game-shell">
      <section class="hero">
        <div class="hero-copy">
          <span class="kicker">Quản trị học - Nhóm 6</span>
          <h1>Minigame Viettel</h1>
          <p>Chọn miếng gà, trả lời nhanh câu hỏi về Tập đoàn Công nghiệp - Viễn thông Quân đội.</p>
          <div class="hero-actions">
            <button class="primary-btn" id="startBtn" type="button">Bắt đầu</button>
            <button class="ghost-btn" id="shuffleBtn" type="button" title="Đổi vị trí các miếng gà">Xáo bàn</button>
          </div>
        </div>

        <div class="hero-art" aria-hidden="true">
          <img class="mascot" src="./assets/chicken-mascot.png" alt="" />
          <img class="bucket" src="./assets/fried-chicken-bucket.png" alt="" />
        </div>
      </section>

      <section class="scorebar" aria-label="Bảng điểm">
        <div>
          <span>Điểm</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>Đúng</span>
          <strong id="correctCount">0/10</strong>
        </div>
        <div>
          <span>Chuỗi</span>
          <strong id="streak">0</strong>
        </div>
        <div>
          <span>Tiến độ</span>
          <strong id="progressText">0%</strong>
        </div>
      </section>

      <section class="board" id="board" aria-label="Bàn chọn câu hỏi"></section>
    </main>

    <dialog class="question-dialog" id="questionDialog">
      <article class="question-card">
        <button class="icon-btn close-btn" id="closeDialog" type="button" aria-label="Đóng">×</button>

        <header class="question-header">
          <div>
            <span class="pill" id="questionLevel">Dễ</span>
            <span class="source" id="questionSource">PDF</span>
          </div>
          <div class="timer" aria-live="polite">
            <span id="timerValue">30</span>
          </div>
        </header>

        <h2 id="questionText"></h2>
        <div class="answers" id="answers"></div>

        <section class="result-panel" id="resultPanel" hidden>
          <img id="resultIcon" alt="" />
          <div>
            <strong id="resultTitle"></strong>
            <p id="resultExplain"></p>
          </div>
        </section>

        <footer class="question-footer">
          <button class="ghost-btn" id="retryBtn" type="button" hidden>Trả lời lại</button>
          <button class="ghost-btn" id="nextBtn" type="button" hidden>Câu khác</button>
        </footer>
      </article>
    </dialog>

    <dialog class="final-dialog" id="finalDialog">
      <article class="final-card">
        <img src="./assets/fried-chicken-pieces.png" alt="" />
        <span class="kicker">Hoàn thành</span>
        <h2 id="finalTitle">Kết quả</h2>
        <p id="finalText"></p>
        <button class="primary-btn" id="restartBtn" type="button">Chơi lại</button>
      </article>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
